name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Lint
        run: npm run lint

      - name: Build
        run: npm run build

  e2e-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Backend (Needed for API proxy tests in E2E)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "Backend/.python-version"

      - name: Start Backend Service
        working-directory: Backend
        env:
          GROQ_API_KEY: "gsk_test_mock"
          SUPABASE_URL: "https://example.supabase.co"
          SUPABASE_KEY: "mock"
          SUPABASE_SERVICE_KEY: "mock"
          CLERK_ALLOWED_ISSUERS: "https://clerk.example.com"
          SUPABASE_JWT_SECRET: "mock"
          PINECONE_API_KEY: "mock"
        run: |
          uv sync
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &

      # 2. Setup Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci --legacy-peer-deps

      - name: Build and Start Frontend Preview
        working-directory: Frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: "pk_test_mock_ci_key"
        run: |
          npm run build
          npm run preview -- --port 5173 &

      # 3. Wait for services to be ready
      - name: Wait for Backend and Frontend
        run: |
          npx wait-on http://localhost:8000/health
          npx wait-on http://localhost:5173

      # 4. Run Puppeteer E2E Tests
      - name: Run Puppeteer E2E
        working-directory: Frontend
        run: npm run test:e2e
