name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Lint
        run: npm run lint

      - name: Build
        run: npm run build

  e2e-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Backend (Needed for API proxy tests in E2E)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "Backend/.python-version"

      - name: Start Backend Service
        working-directory: Backend
        env:
          GROQ_API_KEY: "gsk_test_mock"
          SUPABASE_URL: "https://example.supabase.co"
          SUPABASE_KEY: "mock"
          SUPABASE_SERVICE_KEY: "mock"
          CLERK_ALLOWED_ISSUERS: "https://clerk.example.com"
          SUPABASE_JWT_SECRET: "mock"
          PINECONE_API_KEY: "mock"
          PINECONE_INDEX: "legalsense"
        run: |
          uv sync --frozen
          # Capture stdout+stderr so we can dump it on failure (was hanging silently)
          nohup uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 \
            > "$GITHUB_WORKSPACE/backend.log" 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/backend.pid"

      # 2. Setup Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci --legacy-peer-deps

      - name: Build and Start Frontend Preview
        working-directory: Frontend
        env:
          # Real Clerk test key required — fake strings crash ClerkProvider at boot.
          # Add at: repo Settings → Secrets and variables → Actions → VITE_CLERK_PUBLISHABLE_KEY_TEST
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_TEST }}
          # vite preview has NO dev proxy — point the SPA at the local backend explicitly
          VITE_API_BASE_URL: "http://localhost:8000"
          VITE_WS_BASE_URL: "ws://localhost:8000"
        run: |
          npm run build
          nohup npm run preview -- --port 5173 \
            > "$GITHUB_WORKSPACE/frontend.log" 2>&1 &

      # 3. Wait for services to be ready (60s ceiling — was hanging 40+ min on silent crash)
      - name: Wait for Backend and Frontend
        timeout-minutes: 2
        run: |
          npx wait-on -t 60000 http://localhost:8000/health http://localhost:5173

      # 4. Run Puppeteer E2E Tests
      - name: Run Puppeteer E2E
        working-directory: Frontend
        run: npm run test:e2e

      # 5. On failure, dump logs so we can see what actually crashed
      - name: Dump backend log on failure
        if: failure()
        run: |
          echo "::group::backend.log"
          cat "$GITHUB_WORKSPACE/backend.log" || echo "no backend log"
          echo "::endgroup::"
          echo "::group::frontend.log"
          cat "$GITHUB_WORKSPACE/frontend.log" || echo "no frontend log"
          echo "::endgroup::"
