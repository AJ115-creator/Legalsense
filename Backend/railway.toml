[build]
# Railpack is the current Railway builder (Nixpacks is deprecated as of 2026).
# Auto-detects uv.lock + pyproject.toml and installs uv natively.
builder = "RAILPACK"

[deploy]
# Railpack would auto-detect FastAPI but guesses `main:app`, not `app.main:app`.
# Override explicitly so the import path matches our package layout.
startCommand = "uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
